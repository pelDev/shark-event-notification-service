<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ .Subject }}</title>
    <style>
        @media only screen and (max-width:600px) {
            .container {
                width: 100% !important;
                border-radius: 0 !important;
            }

            .hero-pad {
                padding: 24px 20px 28px !important;
            }

            .footer-pad {
                padding: 20px 20px 28px !important;
            }

            .cta-btn {
                font-size: 15px !important;
                padding: 14px 24px !important;
            }

            .social-icon {
                width: 32px !important;
                height: 32px !important;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #C91CF4;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            mso-table-lspace: 0;
            mso-table-rspace: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            border: 0;
            height: auto;
            outline: none;
        }
    </style>
</head>

<body>
    <!-- Preheader -->
    <span style="display:none;font-size:1px;color:#C91CF4;line-height:1px;max-height:0;opacity:0;overflow:hidden;">{{.Preheader }}</span>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding:28px 16px;">
                <table role="presentation" width="600" class="container"
                    style="width:600px;max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(201,28,244,0.10);"
                    cellpadding="0" cellspacing="0" border="0">

                    <!-- HEADER -->
                    <tr>
                        <td
                            style="background:linear-gradient(135deg,#C91CF4 0%,#8B0FBF 50%,#B4545C 100%);padding:18px 28px;">
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="vertical-align:middle;">
                                        <div
                                            style="display:inline-block;background:#ffffff;padding:6px 12px;border-radius:8px;">
                                            <img alt="Eventor" width="110" src="https://eventor.com.ng/eventor.png"
                                                style="display:block;">
                                        </div>
                                    </td>
                                    <td
                                        style="text-align:right;vertical-align:middle;color:rgba(255,255,255,0.85);font-size:12px;letter-spacing:0.3px;">
                                        One Tap. Endless Events ✨
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- DYNAMIC BODY -->
                    {{ .Body }}

                    <!-- DIVIDER -->
                    <tr>
                        <td style="padding:0 28px;">
                            <div style="height:1px;background:rgba(201,28,244,0.12);"></div>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td class="footer-pad" style="padding:20px 28px 32px;background:#ffffff;">
                            <!-- Social Links -->

                                <tr>

                                            style="display:inline-block;width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#C91CF4,#B4545C);text-align:center;line-height:36px;">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
                                                stroke-width="2">
                                                <rect width="20" height="20" x="2" y="2" rx="5" />
                                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                                                <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                                            </svg>
                                        </a>
                                    </td>
                                    <td style="padding:0 6px;">
                                        <a href="https://umami.eventor.com.ng/q/pavwf4wSZ"
                                            style="display:inline-block;width:36px;height:36px;border-radius:10px;background:#111;text-align:center;line-height:36px;">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff">
                                                <path
                                                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z" />

                                    </td>
                                </tr>

                            <p style="font-size:12px;color:#9ca3af;text-align:center;line-height:1.5;margin:0 0 6px;">
                                Eventor Ltd · Lagos, Nigeria</p>
                            <p style="margin:0 0 6px;font-size:12px;color:#9ca3af;line-height:1.5;text-align:center;">You're receiving
                                this because you have an Eventor account.</p>
                            <p style="margin:0;font-size:12px;text-align:center;"><a href="{{ .UnsubscribeURL }}"
                                    style="color:#C91CF4;text-decoration:underline;">Unsubscribe</a></p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
