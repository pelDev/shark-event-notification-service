<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ .Subject }}</title>

    <style>
        @media only screen and (max-width: 600px) {
            .container {
                width: 100% !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .hero {
                padding: 28px !important;
            }

            .btn {
                width: 100% !important;
                display: inline-block !important;
            }
        }

        body {
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            background-color: #C91CF4;
        }

        table {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            border: 0;
            height: auto;
            outline: none;
            text-decoration: none;
        }
    </style>
</head>

<body style="margin:0; padding:0; background-color:#C91CF4;">
    <!-- Preheader (hidden) -->
    <span
        style="display:none; font-size:1px; color:#ffffff; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
        {{ .Preheader }}
    </span>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:24px 16px;">

                <table role="presentation" width="600" class="container"
                    style="width:600px; max-width:600px; background:#ffffff; border-radius:12px; overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="padding:20px 24px; background:linear-gradient(90deg, #C91CF4 0%, #B4545C 100%);">
                            <table width="100%">
                                <tr>
                                    <td style="vertical-align:middle;">
                                        <div style="display:inline-block; background:#ffffff; padding:6px 10px; border-radius:8px;">
                                            <img alt="Eventor logo" width="120" src="https://eventor.com.ng/eventor.png"
                                                style="display:block;" />
                                        </div>
                                    </td>
                                    <td
                                        style="text-align:right; color:#ffffff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; font-size:13px;">
                                        One Tap. Endless Events ✨
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>


                    <!-- Dynamic Body -->
                    <tr>
                        <td>
                            {{ .Body }}
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding:0 40px;">
                            <hr style="border:none; border-top:1px solid #eef2f7; margin:0;">
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td
                            style="padding:28px 40px 32px; background:#ffffff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;">
                    
                            <!-- Follow us -->
                            <p
                                style="font-size:12px; font-weight:600; color:#111; text-align:center; margin:0 0 12px; text-transform:uppercase; letter-spacing:0.07em;">
                                Follow us</p>
                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                                <tr>
                                    <!-- Instagram -->
                                    <td style="padding:0 6px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="38" height="38"
                                            style="width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,#C91CF4,#B4545C);">
                                            <tr>
                                                <td align="center" valign="middle">
                                                    <a href="https://umami.eventor.com.ng/q/t0PRwoXuZ" style="display:block; text-decoration:none;">
                                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
                                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
                                                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                                                            <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                                                        </svg>
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                    
                                    <!-- Twitter / X -->
                                    <td style="padding:0 6px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="38" height="38"
                                            style="width:38px; height:38px; border-radius:10px; background:#111;">
                                            <tr>
                                                <td align="center" valign="middle">
                                                    <a href="https://umami.eventor.com.ng/q/pavwf4wSZ" style="display:block; text-decoration:none;">
                                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="#ffffff">
                                                            <path
                                                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                                                        </svg>
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                    <!-- TikTok -->
                                    <!-- <td style="padding:0 6px;">
                                        <a href="https://tiktok.com/@eventor.ng" style="display:inline-block; width:38px; height:38px; border-radius:10px; background:#010101; text-align:center; line-height:38px; text-decoration:none;">
                                          <svg width="16" height="16" viewBox="0 0 24 24" fill="#ffffff" style="vertical-align:middle; margin-top:-2px;"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
                                        </a>
                                      </td> -->
                                </tr>
                            </table>
                    
                            <!-- Divider -->
                            <hr style="border:none; border-top:1px solid #eef2f7; margin:0 0 20px;">
                    
                            <!-- Address + legal -->
                            <p style="font-size:12px; color:#6b7280; text-align:center; line-height:1.6; margin:0 0 6px;">
                                Eventor Ltd · Lagos, Nigeria
                            </p>
                            <p style="font-size:12px; color:#6b7280; text-align:center; margin:0 0 10px;">
                                You're receiving this email because you have an Eventor account.
                            </p>
                            <p style="font-size:12px; text-align:center; margin:0;">
                                <a href="{{ .UnsubscribeURL }}" style="color:#9ca3af; text-decoration:underline;">Unsubscribe</a>
                            </p>
                    
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
